<!DOCTYPE html>
<html>
<head>
<script>
function VALIDATEDETAIL() {
    var name = document.forms["RegForm"]["Name"];
    var email = document.forms["RegForm"]["EMail"];
    var phone = document.forms["RegForm"]["Telephone"];
    var what = document.forms["RegForm"]["Subject"];
    var password = document.forms["RegForm"]["Password"];
    var address = document.forms["RegForm"]["Address"];

    if (name.value == "") {
        alert("Please enter your name.");
        name.focus();
        return false;
    }

    if (address.value == "") {
        alert("Please enter your address.");
        address.focus();
        return false;
    }

    if (email.value == "") {
        alert("Please enter a valid e-mail address.");
        email.focus();
        return false;
    }

    if (email.value.indexOf("@", 0) < 0) {
        alert("Please enter a valid e-mail address.");
        email.focus();
        return false;
    }

    if (email.value.indexOf(".", 0) < 0) {
        alert("Please enter a valid e-mail address.");
        email.focus();
        return false;
    }

    if (phone.value == "") {
        alert("Please enter your telephone number.");
        phone.focus();
        return false;
    }

    if (password.value == "") {
        alert("Please enter your password.");
        password.focus();
        return false;
    }

    if (what.selectedIndex < 1) {
        alert("Please enter your course.");
        what.focus();
        return false;
    }

    return true;
}
</script>

<style>
form {
    margin: 0 auto;
    width: 600px;
}

label {
    font-weight: bold;
    width: 100px;
    display: inline-block;
}
</style>
</head>

<body>
<h1 style="text-align:center;">REGISTRATION FORM</h1>

<form name="RegForm" onsubmit="return VALIDATEDETAIL()">

<p><label>Name:</label>
<input type="text" size="65" name="Name"></p>

<p><label>Address:</label>
<input type="text" size="65" name="Address"></p>

<p><label>E-mail Address:</label>
<input type="text" size="65" name="EMail"></p>

<p><label>Password:</label>
<input type="password" size="65" name="Password"></p>

<p><label>Telephone:</label>
<input type="text" size="65" name="Telephone"></p>

<p><label>Select Your Course:</label>
<select name="Subject">
    <option value="">Select</option>
    <option>BTECH</option>
    <option>BBA</option>
    <option>BCA</option>
    <option>B.COM</option>
</select></p>

<p><label>Comments:</label>
<textarea cols="55" name="Comment"></textarea></p>

<p>
<input type="submit" value="Send">
<input type="reset" value="Reset">
</p>

</form>
</body>
</html>
